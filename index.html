<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skin Lesion Classification on HAM10000</title>
  <meta
    name="description"
    content="HAM10000 skin lesion classification project combining patient metadata, handcrafted image features, statistical analysis, and machine learning."
  />
  <style>
    :root {
      --ink: #18212f;
      --muted: #5b6678;
      --line: #d9e0ea;
      --paper: #f7f9fc;
      --panel: #ffffff;
      --teal: #117a7a;
      --rose: #b54b5d;
      --amber: #b87816;
      --blue: #285f9f;
      --shadow: 0 18px 40px rgba(24, 33, 47, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--paper);
      line-height: 1.6;
    }

    a {
      color: inherit;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid rgba(217, 224, 234, 0.86);
      background: rgba(247, 249, 252, 0.92);
      backdrop-filter: blur(16px);
    }

    .nav {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 64px;
      gap: 20px;
    }

    .brand {
      font-weight: 760;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .nav-links a {
      text-decoration: none;
    }

    .nav-links a:hover {
      color: var(--teal);
    }

    .hero {
      min-height: 86vh;
      display: grid;
      align-items: center;
      padding: 72px 0 44px;
      color: #ffffff;
      background:
        linear-gradient(90deg, rgba(17, 31, 46, 0.90), rgba(17, 31, 46, 0.70) 44%, rgba(17, 31, 46, 0.30)),
        url("results/sample_images.png") center / cover no-repeat;
    }

    .hero-inner,
    .section-inner {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
    }

    .hero-content {
      max-width: 760px;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: #b9e5e0;
      font-size: 0.82rem;
      font-weight: 760;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.45rem, 5.7vw, 5.2rem);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .hero-copy {
      max-width: 680px;
      margin: 22px 0 0;
      color: rgba(255, 255, 255, 0.88);
      font-size: 1.1rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 6px;
      color: #ffffff;
      font-weight: 720;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.12);
    }

    .button.primary {
      border-color: #ffffff;
      color: #12202f;
      background: #ffffff;
    }

    .hero-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      margin-top: 54px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.20);
    }

    .hero-stat {
      min-height: 96px;
      padding: 18px;
      background: rgba(12, 26, 40, 0.62);
    }

    .hero-stat strong {
      display: block;
      font-size: 1.7rem;
      line-height: 1.1;
    }

    .hero-stat span {
      display: block;
      margin-top: 6px;
      color: rgba(255, 255, 255, 0.75);
      font-size: 0.9rem;
    }

    section {
      padding: 72px 0;
    }

    section.alt {
      background: #ffffff;
    }
